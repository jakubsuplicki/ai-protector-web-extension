# AI Protector — Docker Compose
#
# Quick start:
#   make demo    → demo mode (mock LLM, no Ollama)
#   make up      → full stack (Ollama + real LLM)
#   make dev     → infra only (apps run locally)

services:
  # ── PostgreSQL + pgvector ─────────────────────────────
  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_protector}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ai-protector

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ai-protector

  # ── Ollama ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: ["full"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - ai-protector

  # ── Langfuse ──────────────────────────────────────────
  # Pinned to v2 — v3 requires ClickHouse + MinIO (overkill for local dev)
  langfuse:
    image: langfuse/langfuse:2
    profiles: ["full"]
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: local-dev-secret
      SALT: local-dev-salt
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - ai-protector

  # ── App Services ───────────────────────────────────────
  proxy-service:
    build:
      context: ../apps/proxy-service
    profiles: ["demo", "full"]
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      MODE: ${MODE:-demo}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/ai_protector}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEFAULT_POLICY: ${DEFAULT_POLICY:-balanced}
      BENCHMARK_SECRET_KEY: ${BENCHMARK_SECRET_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-protector

  agent-demo:
    build:
      context: ../apps/agent-demo
    profiles: ["demo", "full"]
    ports:
      - "8002:8002"
    environment:
      PROXY_BASE_URL: http://proxy-service:8000/v1
      AGENT_ID: ${AGENT_ID_DEMO:-}
      OLLAMA_BASE_URL: http://ollama:11434
      DEFAULT_MODEL: llama3.2:3b
      DEFAULT_MODEL_PREFIX: openai
      DEFAULT_POLICY: balanced
      LITELLM_LOG_LEVEL: ERROR
      MODE: ${MODE:-demo}
    depends_on:
      - proxy-service
    networks:
      - ai-protector

  frontend:
    build:
      context: ../apps/frontend
    profiles: ["demo", "full"]
    ports:
      - "3000:3000"
    environment:
      # Client-side (browser) → calls host machine ports
      NUXT_PUBLIC_API_BASE: http://localhost:8000
      NUXT_PUBLIC_AGENT_API_BASE: http://localhost:8002
      NUXT_PUBLIC_TEST_AGENT_PYTHON_URL: http://localhost:8003
      NUXT_PUBLIC_TEST_AGENT_GRAPH_URL: http://localhost:8004
      NUXT_PUBLIC_REFERENCE_CHAT_TARGET_URL: http://localhost:8010
    depends_on:
      - proxy-service
      - agent-demo
    networks:
      - ai-protector

  # ── Test Agents (wizard go-live) ──────────────────────

  test-agent-python:
    build:
      context: ../apps/test-agents
      dockerfile: pure-python-agent/Dockerfile
    container_name: test-agent-python
    profiles: ["test-agents"]
    ports:
      - "8003:8003"
    environment:
      PROXY_URL: http://proxy-service:8000
      PROXY_POLICY: ${PROXY_POLICY:-balanced}
      AGENT_ID: ${AGENT_ID_PYTHON:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    depends_on:
      - proxy-service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ai-protector

  test-agent-langgraph:
    build:
      context: ../apps/test-agents
      dockerfile: langgraph-agent/Dockerfile
    container_name: test-agent-langgraph
    profiles: ["test-agents"]
    ports:
      - "8004:8004"
    environment:
      PROXY_URL: http://proxy-service:8000
      PROXY_POLICY: ${PROXY_POLICY:-balanced}
      AGENT_ID: ${AGENT_ID_LANGGRAPH:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    depends_on:
      - proxy-service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ai-protector

  # ── Reference Chat Target ─────────────────────────────
  reference-chat-target:
    build:
      context: ../apps/reference-chat-target
    profiles: ["demo", "full"]
    ports:
      - "8010:8010"
    env_file:
      - path: ../apps/reference-chat-target/.env
        required: false
    environment:
      AI_PROTECTOR_BASE_URL: http://proxy-service:8000
      PORT: "8010"
    depends_on:
      - proxy-service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ai-protector

  # ── Model pull (run-once init container) ──────────────
  model-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '⏳ Waiting for Ollama...'
        until curl -sf http://ollama:11434/api/tags >/dev/null 2>&1; do sleep 2; done
        echo '📦 Pulling llama3.2:3b (first run only, ~2.0 GB)...'
        curl -sf http://ollama:11434/api/pull -d '{"name": "llama3.2:3b"}' | while IFS= read -r line; do
          status=$(echo "$$line" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
          [ -n "$$status" ] && printf "\r  %s" "$$status"
        done
        echo ''
        echo '✅ Model ready.'
    networks:
      - ai-protector
    profiles: ["init"]

volumes:
  pgdata:
  ollama_models:

networks:
  ai-protector:
    driver: bridge
