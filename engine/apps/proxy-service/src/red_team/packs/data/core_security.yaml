    type: regex
    pattern: "[A-Z]{2}\\d{2}[\\s]?[\\d]{4}[\\s]?[\\d]{4}[\\s]?[\\d]{4}[\\s]?[\\d]{4}[\\s]?[\\d]{4}[\\s]?[\\d]{0,4}"
