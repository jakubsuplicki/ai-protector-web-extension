name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [proxy-service, agent-demo]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff>=0.8.0
      - name: Ruff check
        run: ruff check apps/${{ matrix.app }}/
      - name: Ruff format check
        run: ruff format --check apps/${{ matrix.app }}/

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npx nuxt prepare
      - run: npx eslint .

  test-proxy:
    name: Test Proxy Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/proxy-service
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aip
          POSTGRES_PASSWORD: aip_secret
          POSTGRES_DB: aip
        options: >-
          --health-cmd="pg_isready -U aip"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 6379:6379
    env:
      MODE: demo
      DATABASE_URL: postgresql+asyncpg://aip:aip_secret@localhost:5432/aip
      REDIS_URL: redis://localhost:6379/0
      LLM_BACKEND_URL: http://localhost:11434
      LANGFUSE_PUBLIC_KEY: test
      LANGFUSE_SECRET_KEY: test
      LANGFUSE_HOST: http://localhost:3001
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: >
          pytest tests/ -v --tb=short -x
          --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml
      - name: Coverage summary
        if: always()
        run: |
          echo "## 🧪 Test Coverage — proxy-service" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -m coverage report --skip-empty | tail -30 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: proxy-coverage
          path: apps/proxy-service/coverage.xml
      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main' && always()
        run: |
          TOTAL=$(python -m coverage report --format=total 2>/dev/null || echo "0")
          echo "COVERAGE_PCT=$TOTAL" >> "$GITHUB_ENV"
          echo "Coverage: ${TOTAL}%"
      - name: Upload coverage badge to Gist
        if: github.ref == 'refs/heads/main' && always()
        continue-on-error: true
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          curl -sS -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/gists/${{ vars.COVERAGE_GIST_ID }}" \
            -d "$(jq -n --arg pct "$COVERAGE_PCT" '{
              files: {
                "coverage-badge.json": {
                  content: ({
                    schemaVersion: 1,
                    label: "coverage",
                    message: ($pct + "%"),
                    color: (if ($pct | tonumber) >= 80 then "brightgreen"
                            elif ($pct | tonumber) >= 60 then "yellow"
                            else "red" end)
                  } | tostring)
                }
              }
            }')"

  test-agent:
    name: Test Agent Demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent-demo
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npx nuxt prepare
      - run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8000
          NUXT_PUBLIC_AGENT_API_BASE: http://localhost:8002

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { context: apps/proxy-service, tag: proxy }
          - { context: apps/agent-demo, tag: agent }
          - { context: apps/frontend, tag: frontend }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build ${{ matrix.service.tag }}
        run: docker build -t ai-protector-${{ matrix.service.tag }}:ci ${{ matrix.service.context }}
