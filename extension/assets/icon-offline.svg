  <!-- inner highlight stroke for depth -->
  <path d="M64 6 L116 24 V62 C116 96 94 117 64 124 C34 117 12 96 12 62 V24 Z"
        fill="none" stroke="#d1d5db" stroke-opacity="0.3" stroke-width="3"/>

  <!-- offline: disconnect X so the state reads at a glance (not just grayer) -->
  <line x1="44" y1="48" x2="84" y2="88"
        stroke="#f3f4f6" stroke-width="11" stroke-linecap="round"/>
  <line x1="84" y1="48" x2="44" y2="88"
        stroke="#f3f4f6" stroke-width="11" stroke-linecap="round"/>
</svg>
