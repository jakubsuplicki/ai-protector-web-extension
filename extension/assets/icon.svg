<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
  </defs>

  <!-- shield fills (almost) the whole canvas: ~6px margin all round -->
  <path d="M64 6 L116 24 V62 C116 96 94 117 64 124 C34 117 12 96 12 62 V24 Z"
        fill="url(#shield)"/>

  <!-- inner highlight stroke for depth -->
  <path d="M64 6 L116 24 V62 C116 96 94 117 64 124 C34 117 12 96 12 62 V24 Z"
        fill="none" stroke="#bae6fd" stroke-opacity="0.4" stroke-width="3"/>

  <!-- protection check mark -->
  <path d="M42 64 L57 80 L88 44"
        fill="none" stroke="#ffffff" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
