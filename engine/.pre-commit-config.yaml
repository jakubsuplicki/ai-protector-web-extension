# See https://pre-commit.com for more information
# Install: pip install pre-commit && pre-commit install --hook-type commit-msg
repos:
  # ── Commit message lint (Conventional Commits) ──
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        name: conventional commit check
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - build
          - refactor
          - test
          - perf
          - ci
          - chore

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        name: ruff check
        args: [--fix, --exit-non-zero-on-fix]
        stages: [pre-commit, pre-push]
      - id: ruff-format
        name: ruff format
        stages: [pre-commit, pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=5120]
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        language: system
        entry: bash -c 'cd apps/frontend && files=(); for f in "$@"; do files+=("${f#apps/frontend/}"); done; npx eslint --no-warn-ignored "${files[@]}"' --
        files: ^apps/frontend/.*\.(vue|ts|js|mjs)$
        types: [file]
