<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldOff" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9ca3af"/>
      <stop offset="0.55" stop-color="#6b7280"/>
      <stop offset="1" stop-color="#4b5563"/>
    </linearGradient>
  </defs>

  <!-- shield fills (almost) the whole canvas: ~6px margin all round -->
  <path d="M64 6 L116 24 V62 C116 96 94 117 64 124 C34 117 12 96 12 62 V24 Z"
